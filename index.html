<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Rough Cut Manufacturing — custom fabrication, 3D printing, and protective solutions for shops and teams."
    />
    <meta name="robots" content="index,follow" />
    <!-- Link-preview / social share card (Open Graph + Twitter). Image lives at
         /public/og-image.jpeg — the Direction-E red badger + Rough Cut wordmark.
         Absolute URLs (roughcutmfg.com) so Facebook and other crawlers resolve them. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Rough Cut Manufacturing" />
    <meta property="og:url" content="https://roughcutmfg.com/" />
    <meta property="og:title" content="Rough Cut Manufacturing" />
    <meta
      property="og:description"
      content="Custom fabrication, 3D printing & protective solutions."
    />
    <meta property="og:image" content="https://roughcutmfg.com/og-image.jpeg" />
    <meta property="og:image:secure_url" content="https://roughcutmfg.com/og-image.jpeg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="2400" />
    <meta property="og:image:height" content="1260" />
    <meta property="og:image:alt" content="Rough Cut Manufacturing" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rough Cut Manufacturing" />
    <meta
      name="twitter:description"
      content="Custom fabrication, 3D printing & protective solutions."
    />
    <meta name="twitter:image" content="https://roughcutmfg.com/og-image.jpeg" />
    <meta name="twitter:image:alt" content="Rough Cut Manufacturing" />
    <meta name="theme-color" content="#9333ea" />
    <script>
      // Apply the saved theme before first paint to avoid a color flash.
      // Keep THEME_BG in sync with index.css [data-theme] blocks and src/theme/themes.ts.
      (function () {
        try {
          var THEME_BG = {
            'midnight-purple': '#0f0218',
            'deep-ocean': '#07121f',
            forest: '#07140e',
            ember: '#15100a',
            crimson: '#150407',
            graphite: '#0c0d10',
            daylight: '#f4f6f9',
          };
          var t = localStorage.getItem('worktrack-theme');
          if (!t || !THEME_BG[t]) t = 'midnight-purple';
          var light = t === 'daylight';
          var d = document.documentElement;
          d.setAttribute('data-theme', t);
          d.style.background = THEME_BG[t];
          d.style.color = light ? '#14181f' : '#e2e8f0';
          d.style.colorScheme = light ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
    <script>
      // Preload the above-the-fold public-site fonts ONLY on public routes, so the
      // employee app (/login, /app/*) never pays for them. Mirrors the pre-paint
      // theme script above. Self-hosted subsets live in /public/fonts.
      (function () {
        try {
          var p = window.location.pathname;
          var isPublic =
            p === '/' ||
            p === '/quote' ||
            p === '/privacy' ||
            p === '/terms' ||
            p === '/shop' ||
            p.indexOf('/shop/') === 0;
          if (!isPublic) return;
          ['/fonts/schibsted-grotesk-800.woff2', '/fonts/hanken-grotesk-400.woff2', '/fonts/hanken-grotesk-600.woff2', '/fonts/hanken-grotesk-700.woff2'].forEach(
            function (href) {
              var l = document.createElement('link');
              l.rel = 'preload';
              l.as = 'font';
              l.type = 'font/woff2';
              l.crossOrigin = 'anonymous';
              l.href = href;
              document.head.appendChild(l);
            }
          );
        } catch (e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WorkTrack Pro</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      />
    </noscript>
    <style>
      html, body { margin: 0; min-height: 100%; background: #0f172a; color: #e2e8f0; font-family: 'Plus Jakarta Sans', Inter, system-ui, sans-serif; }
      #root { min-height: 100%; }
      #root:empty::after { content: 'Loading WorkTrack Pro…'; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    </style>
  </head>
  <body>
    <noscript>
      <div style="max-width: 32rem; margin: 2rem auto; padding: 1.5rem; background: #1e293b; border-radius: 0.5rem;">
        <p style="margin: 0 0 1rem;">WorkTrack Pro needs JavaScript to run. Enable it and reload.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
