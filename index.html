<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="WorkTrack Pro is a mobile-first job, inventory, and time-tracking platform for shop floor and admin teams."
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#ea4444" />
    <script>
      // Resolve the saved palette + mode before first paint to avoid a color flash.
      // Appearance = palette (data-theme) x mode (data-mode = resolved light/dark).
      // Keep DARK_BG / LIGHT_BG in sync with index.css and src/theme/themes.ts.
      (function () {
        try {
          var DARK_BG = {
            'signal-red': '#121214',
            'deep-ocean': '#07121f',
            forest: '#07140e',
            ember: '#15100a',
            crimson: '#150407',
            graphite: '#0c0d10',
          };
          var LIGHT_BG = '#f4f6f9';
          var rawT = localStorage.getItem('worktrack-theme');
          // Migrate the removed 'daylight' theme -> signal-red palette in light mode.
          var t = rawT === 'daylight' || !DARK_BG[rawT] ? 'signal-red' : rawT;
          var m = localStorage.getItem('worktrack-mode');
          if (m !== 'light' && m !== 'dark' && m !== 'system') {
            m = rawT === 'daylight' ? 'light' : 'system';
          }
          var resolved =
            m === 'system'
              ? window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : m;
          var light = resolved === 'light';
          var d = document.documentElement;
          d.setAttribute('data-theme', t);
          d.setAttribute('data-mode', resolved);
          d.style.background = light ? LIGHT_BG : DARK_BG[t];
          d.style.color = light ? '#14181f' : '#f4f5f7';
          d.style.colorScheme = light ? 'light' : 'dark';
        } catch (e) {}
      })();
    </script>
    <script>
      // Preload the above-the-fold Schibsted/Hanken subsets. Direction E adopts
      // these across BOTH surfaces (public marketing + employee app), so preload
      // unconditionally. Self-hosted subsets live in /public/fonts.
      (function () {
        try {
          ['/fonts/schibsted-grotesk-800.woff2', '/fonts/hanken-grotesk-400.woff2', '/fonts/hanken-grotesk-600.woff2', '/fonts/hanken-grotesk-700.woff2'].forEach(
            function (href) {
              var l = document.createElement('link');
              l.rel = 'preload';
              l.as = 'font';
              l.type = 'font/woff2';
              l.crossOrigin = 'anonymous';
              l.href = href;
              document.head.appendChild(l);
            }
          );
        } catch (e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>WorkTrack Pro</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      />
    </noscript>
    <style>
      html, body { margin: 0; min-height: 100%; background: #121214; color: #f4f5f7; font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif; }
      #root { min-height: 100%; }
      #root:empty::after { content: 'Loading WorkTrack Pro…'; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    </style>
  </head>
  <body>
    <noscript>
      <div style="max-width: 32rem; margin: 2rem auto; padding: 1.5rem; background: #1e293b; border-radius: 0.5rem;">
        <p style="margin: 0 0 1rem;">WorkTrack Pro needs JavaScript to run. Enable it and reload.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
