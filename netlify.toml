# WorkTrack Pro - Netlify
# Build and deploy from GitHub
# Required env vars (set in Netlify dashboard): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (build);
# for functions: SUPABASE_SERVICE_ROLE_KEY, TURNSTILE_SECRET_KEY, RESEND_API_KEY, PROPOSAL_* / RESEND_*
#
# WorkTrackAccounting TAX-SYNC scheduled function:
#   netlify/functions/tax-table-refresh.mjs runs QUARTERLY via an in-code V2
#   schedule (export const config = { schedule: "0 6 1 1,4,7,10 *" }) — no toml
#   [functions] schedule block is needed for V2 scheduled functions. It is ALSO
#   reachable on-demand for the admin "check now" at /api/tax-table-refresh (via
#   the /api/* redirect below). It is HARD-GATED on the server env var
#   ACCOUNTING_TAX_SYNC_ENABLED (default OFF): when off it performs no external
#   fetch and no DB write. Set that var (Site settings -> Environment variables)
#   ONLY after the module graduates and the source parsers are verified against the
#   live CDTFA/EDD files. The function uses SUPABASE_SERVICE_ROLE_KEY and stays
#   entirely within the accounting.* schema (advisory-only: it never mutates stored
#   tax rates).
#
# WorkTrackAccounting invoice reminders (dunning) scheduled function:
#   netlify/functions/invoice-reminders.mjs runs DAILY via an in-code V2 schedule
#   (export const config = { schedule: "0 14 * * *" }) — no toml schedule block needed.
#   It is ALSO reachable on-demand for the admin "run now" at /api/invoice-reminders
#   (Bearer accounting_admin) via the /api/* redirect below. It is HARD-GATED on the
#   server env var ACCOUNTING_DUNNING_ENABLED (default OFF): when off it sends no email
#   and performs no DB write. The per-tenant settings.dunning.enabled flag is an ADDITIONAL
#   soft switch. It uses RESEND_API_KEY + SUPABASE_SERVICE_ROLE_KEY and writes only
#   accounting.invoice_emails / accounting.portal_tokens (no journal entries, no money).
#   Set ACCOUNTING_FROM_EMAIL (or rely on settings.dunning.fromEmail) for the sender.
#
# WorkTrackAccounting customer portal:
#   netlify/functions/send-invoice-email.mjs (admin "Email invoice") and
#   netlify/functions/portal-invoice.mjs (the PUBLIC token-gated invoice read) are plain
#   on-demand functions reached via the /api/* redirect. portal-invoice CORS is locked to
#   the APP_PUBLIC_URL origin and only ever returns the safe projection from
#   accounting.portal_invoice_payload (service-role).

[build]
  command = "npm run build"
  publish = "dist"

# WorkTrackAccounting UI is enabled on PR deploy previews AND on production. Accounting routes
# are admin-gated (AdminGuard) and every accounting.* row is RLS-protected, so flipping the UI on
# only exposes it to ADMIN users; the Postgres schema is already deployed + exposed in PostgREST.
# (Production was previously flag-dark; enabled 2026-06-08 for live admin testing.)
[context.deploy-preview.environment]
  VITE_ACCOUNTING_ENABLED = "true"

[context.production.environment]
  VITE_ACCOUNTING_ENABLED = "true"

# ── Unified-billing TEST RIG (branch deploys only) ───────────────────────────
# Branch deploys are the hosted rehearsal environment for the unified jobs↔billing
# + QuickBooks replica work (docs/QBO_CUTOVER_RUNBOOK.md). They point the BUILD at
# the Supabase development branch `unified-billing-dev` — NOT production — so the
# QBO sync rehearsal and the jobs↔billing click-path run entirely against test
# data. Only the non-secret URL + flag are pinned here; the matching
# VITE_SUPABASE_ANON_KEY (and the branch SERVICE key + QBO_* creds) are set in the
# Netlify UI scoped to the "Branch deploys" context — no credential is committed
# (keeps the secret scanner green). This context affects no production or
# deploy-preview build. REMOVE this section at cutover, when the feature merges and
# the Supabase branch is deleted.
[context.branch-deploy.environment]
  VITE_ACCOUNTING_ENABLED = "true"
  VITE_SUPABASE_URL = "https://lvcufbmyhbqhvowjxmst.supabase.co"

[functions]
  directory = "netlify/functions"

# Routes the SPA's /api/* calls (incl. the TAX-SYNC "check now" POST
# /api/tax-table-refresh) to the matching Netlify function.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA: all routes -> index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
